# Default hallucitron configuration: providers, their models, and per-model prices.
#
# Shape:
#   providers:  map of provider-id -> {name, kind, endpoint, api_key, api_key_env,
#                                      models: [model-name, ...], more_prices: {...}}
#   `kind` is the adapter family: "openai", "anthropic", or "xai" (xai uses the
#   openai-compatible adapter with a couple of xai-specific tweaks).
#   models:     map of model-name -> price/capability table (pp1000t_*, modelcap_*, order)
#
# A provider OWNS a set of models (by name). Looking up a model finds the single
# provider whose `models` list contains it.
#
# API keys:
#   - `api_key` is the literal key for this provider (empty here; a real deployment
#     injects per-tenant keys, or fills them from env -- see load_default_config).
#   - `api_key_env` names the environment variable to read when keys are loaded from
#     the environment (load_default_config(use_env_keys=True)).
#
# In a multi-tenant system each tenant supplies its own config (its own providers +
# keys); this file is only the built-in default used by tests and examples.
#
# Prices: per-1000-tokens (pp1000t_*) and per-call (pp1call_*, pp1image), in integer
# "coins" (1 coin = $1e-6). `more_prices` on a provider is merged into every model it
# owns. Leave a model's prices empty and coins stays 0 while token usage still reports.

providers:
  xai_global:
    name: xAI
    kind: xai
    endpoint: https://api.x.ai/v1
    api_key: ""
    api_key_env: XAI_API_KEY
    models:
      - grok-code-fast-1
      - grok-4.20-0309-reasoning
      - grok-4.20-0309-non-reasoning
      - grok-4-1-fast-reasoning
      - grok-4-1-fast-non-reasoning
    # xAI server-side tool / per-image fees, merged into each model's prices.
    more_prices:
      pp1call_web_search: 5000
      pp1call_x_search: 5000
      pp1call_code_interpreter: 5000
      pp1call_document_search: 5000
      pp1call_file_search: 2500
      # pp1image: 52
      # Per-image flat fee. Empirically derived (grok-4.20-0309-reasoning, 20260603):
      # an image is ~443 input tokens that xAI does NOT discount when the prompt is
      # cache-hit -- they keep billing at the full input rate (1250/1Mt) while we
      # count them in cached_tokens at the cheap cache rate (200/1Mt). That under-
      # count is a constant ~414 coins per cached image (xAI cost_in_usd_ticks minus
      # our coins, identical across repeated cached calls). On a fresh (uncached)
      # image the token rates already match, so this fee slightly over-counts there;
      # 414 is the best single value matching the steady-state cached case.
      pp1image: 414

  openai_global:
    name: OpenAI
    kind: openai
    endpoint: https://api.openai.com/v1
    api_key: ""
    api_key_env: OPENAI_API_KEY
    models:
      - gpt-5.4
      - gpt-5.4-mini
      - gpt-5.4-nano
      - gpt-5.2
      - gpt-5.1
      - gpt-5-mini
      - gpt-5-nano

  anthropic_global:
    name: Anthropic
    kind: anthropic
    endpoint: https://api.anthropic.com/v1
    api_key: ""
    api_key_env: ANTHROPIC_API_KEY
    models:
      - claude-sonnet-4-6
      - claude-opus-4-6
      - claude-haiku-4-5-20250929

