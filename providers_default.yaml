# Default hallucitron configuration: providers, their models, and per-model prices.
#
# Shape:
#   providers:  map of provider-id -> {name, kind, endpoint, api_key, api_key_env,
#                                      models: [model-name, ...], more_prices: {...}}
#   `kind` is the adapter family: "openai", "anthropic", or "xai" (xai uses the
#   openai-compatible adapter with a couple of xai-specific tweaks).
#   models:     map of model-name -> price/capability table (pp1000t_*, modelcap_*, order)
#
# A provider OWNS a set of models (by name). Looking up a model finds the single
# provider whose `models` list contains it.
#
# API keys:
#   - `api_key` is the literal key for this provider.
#   - `api_key_env` names the environment variable to read when keys are loaded.
#
# Prices:
#   - pp1000t_* are integer coins per 1000 tokens.
#   - pp1call_* are integer coins per call.
#   - 1 coin = $1e-6.
#   - USD / 1M tokens * 1000 = coins / 1K tokens.

providers:
  xai_global:
    name: xAI
    kind: xai
    endpoint: https://api.x.ai/v1
    api_key: ""
    api_key_env: XAI_API_KEY
    models:
      - grok-4.3
      - grok-build-0.1
      - grok-4-1-fast-reasoning
      - grok-4-1-fast-non-reasoning
    more_prices:
      pp1call_web_search: 5000
      pp1call_x_search: 5000
      pp1call_code_execution: 5000
      pp1call_code_interpreter: 5000

      # xAI calls this "attachment_search".
      pp1call_attachment_search: 10000

      # xAI calls this "collections_search" / "file_search".
      pp1call_file_search: 2500
      pp1call_collections_search: 2500

      # Back-compat alias for older internal configs.
      pp1call_document_search: 2500

      # Per-image flat fee. Empirically derived (grok-4.3, 20260610): xAI bills
      # ~436 image tokens at the full input rate (1250/1Mt) even on cache hits,
      # while we count them in cached_tokens at the cache rate (200/1Mt). The
      # undercount is a constant 458 coins per cached image (xAI cost_in_usd_ticks
      # minus our coins, identical across repeated cached calls). On a fresh image
      # the token rates already match, so this slightly over-counts there; 458 is
      # the best single value for the steady-state cached case. Was 414 on
      # grok-4.20 (~443 image tokens).
      pp1image: 458

  openai_global:
    name: OpenAI
    kind: openai
    endpoint: https://api.openai.com/v1
    api_key: ""
    api_key_env: OPENAI_API_KEY
    models:
      - gpt-5.5-pro
      - gpt-5.5
      - gpt-5.4-pro
      - gpt-5.4
      - gpt-5.4-mini
      - gpt-5.4-nano
    more_prices:
      pp1call_web_search: 10000
      pp1call_file_search: 2500

  anthropic_global:
    name: Anthropic
    kind: anthropic
    endpoint: https://api.anthropic.com/v1
    api_key: ""
    api_key_env: ANTHROPIC_API_KEY
    models:
      - claude-fable-5
      - claude-opus-4-8
      - claude-sonnet-4-6
      - claude-haiku-4-5-20251001
    more_prices:
      pp1call_web_search: 10000

models:
  # --- xAI ---

  grok-4.3:
    pp1000t_prompt: 0
    pp1000t_prompt_text: 1250
    pp1000t_prompt_image: 1250
    pp1000t_prompt_cached: 200
    pp1000t_completion: 2500
    pp1000t_completion_reasoning: 2500
    modelcap_reasoning_effort: [none, low, medium, high]
    modelcap_input_images: true
    order: 1040

  grok-build-0.1:
