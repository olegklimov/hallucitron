# Model -> provider config for hallucitron tests and examples.
#
# API keys are NOT stored here -- each model names the env var that holds its key
# (see .test_api_keys.example). Source your keys before running tests:
#     source .test_api_keys
#
# `prices` is optional. When present it drives the integer "coins" cost estimate
# (see convolute_usage_with_prices). Keys are per-1000-tokens (pp1000t_*) and
# per-call (pp1call_*, pp1image). Leave it empty and coins stays 0 while token
# usage is still reported. Example shape:
#
#   prices:
#     pp1000t_prompt: 3000           # full-price input, per 1000 tokens
#     pp1000t_cache_read: 300
#     pp1000t_cache_creation: 3750
#     pp1000t_completion: 15000      # output, per 1000 tokens
#     pp1image: 1000                 # per input image
#     pp1call_web_search: 10000      # per server-side tool call

models:
  claude-sonnet-4-6:
    provider: anthropic
    endpoint: https://api.anthropic.com/v1
    api_key_env: ANTHROPIC_API_KEY
    prices: {}

  gpt-5.4:
    provider: openai
    endpoint: https://api.openai.com/v1
    api_key_env: OPENAI_API_KEY
    prices: {}

  grok-4-1-fast-reasoning:
    provider: xai
    endpoint: https://api.x.ai/v1
    api_key_env: XAI_API_KEY
    prices: {}
